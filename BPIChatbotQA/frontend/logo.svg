<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 100" width="560" height="100" aria-label="BPI IBM Logo">

  <!-- Dark crimson background -->
  <rect width="560" height="100" fill="#8B1515"/>

  <!-- ════════════════════════════════
       BPI CREST — shield with crown, tower, lion
  ════════════════════════════════ -->
  <g transform="translate(10, 4)">

    <!-- Shield outer gold border -->
    <path d="M38 0 L74 0 L74 58 Q74 78 38 92 Q2 78 2 58 L2 0 Z" fill="#D4A820"/>
    <!-- Shield inner crimson fill -->
    <path d="M38 5 L69 5 L69 58 Q69 75 38 87 Q7 75 7 58 L7 5 Z" fill="#8B1515"/>

    <!-- ── CROWN (top centre) ── -->
    <!-- Crown band -->
    <rect x="22" y="6" width="32" height="7" fill="#D4A820" rx="1"/>
    <!-- Crown left spike -->
    <polygon points="22,13 26,4 30,13" fill="#D4A820"/>
    <!-- Crown centre spike (tallest) -->
    <polygon points="31,13 38,0 45,13" fill="#D4A820"/>
    <!-- Crown right spike -->
    <polygon points="46,13 50,4 54,13" fill="#D4A820"/>
    <!-- Crown jewel dots -->
    <circle cx="26" cy="9"  r="2" fill="#8B1515"/>
    <circle cx="38" cy="7"  r="2" fill="#8B1515"/>
    <circle cx="50" cy="9"  r="2" fill="#8B1515"/>

    <!-- ── CASTLE / TOWER (left side of shield) ── -->
    <!-- Tower main body -->
    <rect x="11" y="42" width="22" height="30" fill="#D4A820"/>
    <!-- Tower top platform -->
    <rect x="9"  y="38" width="26" height="6"  fill="#D4A820"/>
    <!-- Battlements: 3 merlons -->
    <rect x="9"  y="28" width="6"  height="12" fill="#D4A820"/>
    <rect x="19" y="28" width="6"  height="12" fill="#D4A820"/>
    <rect x="29" y="28" width="6"  height="12" fill="#D4A820"/>
    <!-- Gate arch -->
    <rect x="18" y="55" width="8"  height="17" fill="#8B1515"/>
    <ellipse cx="22" cy="55" rx="4" ry="3" fill="#8B1515"/>
    <!-- Tower windows -->
    <rect x="13" y="44" width="5" height="6" fill="#8B1515" rx="1"/>
    <rect x="26" y="44" width="5" height="6" fill="#8B1515" rx="1"/>

    <!-- ── RAMPANT LION (right side of shield) ── -->
    <!-- Lion body (upright, facing left) -->
    <!-- Hindquarters -->
    <ellipse cx="57" cy="68" rx="9"  ry="11" fill="#D4A820"/>
    <!-- Torso -->
    <ellipse cx="53" cy="52" rx="8"  ry="12" fill="#D4A820"/>
    <!-- Neck -->
    <rect    x="48" y="36" width="11" height="10" fill="#D4A820" rx="4"/>
    <!-- Head -->
    <circle  cx="52" cy="33" r="10"  fill="#D4A820"/>
    <!-- Mane (slightly darker ring) -->
    <circle  cx="52" cy="33" r="10"  fill="none" stroke="#B8900A" stroke-width="3"/>
    <!-- Face details -->
    <circle  cx="49" cy="31" r="1.5" fill="#8B1515"/>
    <circle  cx="55" cy="31" r="1.5" fill="#8B1515"/>
    <path    d="M48,36 Q52,38 56,36" fill="none" stroke="#8B1515" stroke-width="1.5"/>
    <!-- Front raised paw (top-left) -->
    <ellipse cx="44" cy="42" rx="5" ry="4" fill="#D4A820"/>
    <ellipse cx="40" cy="46" rx="4" ry="3" fill="#D4A820"/>
    <!-- Front lower paw -->
    <ellipse cx="46" cy="62" rx="5" ry="4" fill="#D4A820"/>
    <!-- Tail (curling up over back) -->
    <path d="M63,60 Q72,44 65,32 Q62,26 64,36" fill="none" stroke="#D4A820" stroke-width="5" stroke-linecap="round"/>
    <!-- Tail tip tuft -->
    <circle cx="64" cy="35" r="4" fill="#D4A820"/>
    <!-- Hind legs -->
    <ellipse cx="52" cy="76" rx="5" ry="4" fill="#D4A820"/>
    <ellipse cx="62" cy="76" rx="5" ry="4" fill="#D4A820"/>
  </g>

  <!-- ════════════════════════════════
       BPI bold white text
  ════════════════════════════════ -->
  <text x="100" y="68"
        font-family="'Arial Black','Franklin Gothic Heavy',Impact,Arial,sans-serif"
        font-weight="900" font-size="58" fill="white" letter-spacing="2">BPI</text>

  <!-- Gold vertical divider -->
  <rect x="264" y="12" width="2" height="72" fill="#D4A820"/>

  <!-- ════════════════════════════════
       IBM — 8-stripe classic logo
       stripe h=6  gap=4  pitch=10
       8 rows: y = 12,22,32,42,52,62,72,82
  ════════════════════════════════ -->

  <!-- ── I  (x=278–312, w=34) ── -->
  <rect x="278" y="12" width="34" height="6" fill="white"/>
  <rect x="278" y="22" width="34" height="6" fill="white"/>
  <rect x="278" y="32" width="34" height="6" fill="white"/>
  <rect x="278" y="42" width="34" height="6" fill="white"/>
  <rect x="278" y="52" width="34" height="6" fill="white"/>
  <rect x="278" y="62" width="34" height="6" fill="white"/>
  <rect x="278" y="72" width="34" height="6" fill="white"/>
  <rect x="278" y="82" width="34" height="6" fill="white"/>
  <!-- I corner notches top -->
  <rect x="278" y="12" width="9"  height="6" fill="#8B1515"/>
  <rect x="303" y="12" width="9"  height="6" fill="#8B1515"/>
  <!-- I corner notches bottom -->
  <rect x="278" y="82" width="9"  height="6" fill="#8B1515"/>
  <rect x="303" y="82" width="9"  height="6" fill="#8B1515"/>

  <!-- ── B  (x=324–384) ── -->
  <!-- Flat rows (no bump): 1,3,5,7,8 → width=50 -->
  <rect x="324" y="12" width="50" height="6" fill="white"/>
  <rect x="324" y="32" width="50" height="6" fill="white"/>
  <rect x="324" y="52" width="50" height="6" fill="white"/>
  <rect x="324" y="72" width="50" height="6" fill="white"/>
  <rect x="324" y="82" width="50" height="6" fill="white"/>
  <!-- Bump rows: 2,4,6 → width=60 -->
  <rect x="324" y="22" width="60" height="6" fill="white"/>
  <rect x="324" y="42" width="60" height="6" fill="white"/>
  <rect x="324" y="62" width="60" height="6" fill="white"/>
  <!-- B bump carve-outs (top bump) -->
  <rect x="370" y="13" width="12" height="5" fill="#8B1515"/>
  <rect x="380" y="22" width="6"  height="6" fill="#8B1515"/>
  <!-- B middle gap between bumps -->
  <rect x="370" y="33" width="12" height="5" fill="#8B1515"/>
  <!-- B bump carve-outs (bottom bump) -->
  <rect x="370" y="43" width="12" height="6" fill="#8B1515"/>
  <rect x="380" y="42" width="6"  height="6" fill="#8B1515"/>
  <rect x="370" y="53" width="12" height="5" fill="#8B1515"/>
  <!-- B bottom cap -->
  <rect x="370" y="73" width="12" height="5" fill="#8B1515"/>
  <rect x="370" y="83" width="12" height="5" fill="#8B1515"/>

  <!-- ── M  (x=398–500, w=94) ── -->
  <rect x="398" y="12" width="94" height="6" fill="white"/>
  <rect x="398" y="22" width="94" height="6" fill="white"/>
  <rect x="398" y="32" width="94" height="6" fill="white"/>
  <rect x="398" y="42" width="94" height="6" fill="white"/>
  <rect x="398" y="52" width="94" height="6" fill="white"/>
  <rect x="398" y="62" width="94" height="6" fill="white"/>
  <rect x="398" y="72" width="94" height="6" fill="white"/>
  <rect x="398" y="82" width="94" height="6" fill="white"/>
  <!-- M: left outer V notch rows 1-2 -->
  <rect x="412" y="12" width="12" height="16" fill="#8B1515"/>
  <!-- M: right outer V notch rows 1-2 (mirror) -->
  <rect x="470" y="12" width="12" height="16" fill="#8B1515"/>
  <!-- M: left inner notch row 3 -->
  <rect x="404" y="32" width="14" height="6"  fill="#8B1515"/>
  <!-- M: right inner notch row 3 -->
  <rect x="476" y="32" width="14" height="6"  fill="#8B1515"/>
  <!-- M: left notch row 4 (V closes) -->
  <rect x="398" y="42" width="10" height="6"  fill="#8B1515"/>
  <!-- M: right notch row 4 -->
  <rect x="482" y="42" width="10" height="6"  fill="#8B1515"/>

  <!-- ® -->
  <text x="494" y="24" font-family="Arial,sans-serif" font-size="13" fill="white">®</text>

</svg>
